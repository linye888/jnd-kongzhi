# LP Admin — Ubuntu Nginx 配置
# 占位符 __DOMAIN__ __ADMIN_DOMAIN__ __APP_DIR__ 由 install.sh 替换

# 管理后台（静态前端）
server {
    listen 80;
    server_name __ADMIN_DOMAIN__;

    root __APP_DIR__/admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# API + 落地页（反向代理到 Node.js）
server {
    listen 80;
    server_name __DOMAIN__ www.__DOMAIN__ customers.__DOMAIN__ origin.__DOMAIN__;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
