name = "lp-admin-worker"
main = "src/index.ts"
compatibility_date = "2025-07-04"
compatibility_flags = ["nodejs_compat"]

[vars]
PLATFORM_ZONE = "minishort.sbs"
CNAME_TARGET = "customers.minishort.sbs"
ADMIN_DEFAULT_EMAIL = "admin@example.com"
ADMIN_DEFAULT_PASSWORD = "admin123456"
CF_ACCOUNT_ID = "6264257c07a1f8fcd60375f5d5434fc1"
CF_ZONE_ID = "be18f06f76ed1fd17bccf2cb877fdcf6"
FALLBACK_ORIGIN = "origin.minishort.sbs"
ADMIN_PAGES_TARGET = "lp-admin-6rt.pages.dev"

[triggers]
crons = ["0 * * * *"]

[[routes]]
pattern = "minishort.sbs/*"
zone_name = "minishort.sbs"

[[routes]]
pattern = "www.minishort.sbs/*"
zone_name = "minishort.sbs"

[[routes]]
pattern = "origin.minishort.sbs/*"
zone_name = "minishort.sbs"

[[d1_databases]]
binding = "DB"
database_name = "lp-admin-db"
database_id = "8e21f7cc-d9ad-4c84-8ac6-7bedaf93f766"
migrations_dir = "../../packages/db/migrations"

[[kv_namespaces]]
binding = "KV"
id = "7f41a9c383044a259c4c87843a27b3b1"

[[r2_buckets]]
binding = "R2"
bucket_name = "lp-admin-assets"

[assets]
directory = "../../legacy/assets"
binding = "ASSETS"

[dev]
port = 8787
