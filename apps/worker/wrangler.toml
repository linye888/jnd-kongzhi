name = "lp-admin-worker"
main = "src/index.ts"
compatibility_date = "2025-07-04"
compatibility_flags = ["nodejs_compat"]

[vars]
CNAME_TARGET = "customers.yourplatform.com"
JWT_SECRET = "dev-secret-change-in-production"
ADMIN_DEFAULT_EMAIL = "admin@example.com"
ADMIN_DEFAULT_PASSWORD = "admin123456"

[triggers]
crons = ["0 * * * *"]

[[d1_databases]]
binding = "DB"
database_name = "lp-admin-db"
database_id = "local-dev-db"
migrations_dir = "../../packages/db/migrations"

[[kv_namespaces]]
binding = "KV"
id = "local-dev-kv"

[[r2_buckets]]
binding = "R2"
bucket_name = "lp-admin-assets"

[assets]
directory = "../../legacy/assets"
binding = "ASSETS"

[dev]
port = 8787
